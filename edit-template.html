<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Template</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f8fbff;
            color: #101828;
            min-height: 100vh;
        }
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            border-radius: 24px;
            box-shadow: 0 25px 60px rgba(15, 23, 42, 0.08);
        }
        img {
            border-radius: 20px;
            max-height: 360px;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <main class="hero py-5">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-xl-8">
                    <div class="card p-5 bg-white">
                        <h1 class="fw-bold">Edit Your Template</h1>
                        <p class="lead text-muted">Use the chosen image to customize your site template.</p>
                        <div id="preview" class="mt-4"></div>
                        <div class="mt-4 d-flex flex-column flex-sm-row gap-3">
                            <a href="index.html" class="btn btn-outline-primary">Back to homepage</a>
                            <button id="editButton" class="btn btn-primary">Start editing</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
        const params = new URLSearchParams(window.location.search);
        const theme = params.get('theme') || 'Selected theme';
        const image = params.get('image');
        const preview = document.getElementById('preview');
        preview.innerHTML = `
            <h2 class="fw-bold">${theme}</h2>
            <p class="text-muted">This is your chosen template image. Continue editing the site to match your brand.</p>
            ${image ? `<img src="${image}" alt="${theme}" class="img-fluid w-100">` : '<div class="alert alert-secondary">No image selected.</div>'}
        `;
        document.getElementById('editButton').addEventListener('click', () => {
            alert('Editing mode would open here.');
        });
    </script>
</body>
</html>
